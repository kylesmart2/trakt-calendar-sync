name: Release

# Push a tag like v1.0.0 to build all three platforms and publish a GitHub
# Release with the binaries attached. workflow_dispatch (the "Run workflow"
# button in the Actions tab) runs the same build+test on all three OSes
# without publishing anything - useful for validating the pipeline itself.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: TraktCalendarSync-linux-x86_64
          - os: windows-latest
            asset_name: TraktCalendarSync-windows-x86_64.exe
          - os: macos-latest
            asset_name: TraktCalendarSync-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # PySide6's offscreen platform plugin (used for the test suite here)
      # needs a few system libraries GitHub's Ubuntu runner doesn't ship by
      # default.
      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxkbcommon-x11-0 libxcb-cursor0 libgl1

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The shared Google OAuth client can't be committed (see .gitignore) -
      # it's stored as a repo secret and written to disk here instead.
      - name: Write shared Google OAuth client
        shell: bash
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > resources/credentials.json

      - name: Run tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./packaging/build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: packaging\build_windows.ps1

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: mv dist/TraktCalendarSync "dist/${{ matrix.asset_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/TraktCalendarSync.exe "dist/${{ matrix.asset_name }}"

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r "${{ matrix.asset_name }}" "Trakt Calendar Sync.app"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/*/* --generate-notes
