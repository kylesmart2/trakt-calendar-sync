name: Docker Publish

# Builds web/Dockerfile and pushes it to GHCR so `docker compose pull` (or a
# plain `docker compose up` without --build) works for anyone without them
# needing to build the image from source themselves - see web/README.md.
on:
  push:
    branches: [main]
    paths:
      # src/** and pyproject.toml are here because web/Dockerfile actually
      # COPYs them in and installs from the root pyproject.toml - the image
      # isn't fully self-contained under web/, so those genuinely affect it.
      - "web/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docker-publish.yml"
      - "!web/README.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/kylesmart2/trakt-calendar-sync-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # credentials.json is gitignored (see release.yml, which does the same
      # thing for the native build) - without this the published image would
      # have no Google OAuth client baked in at all, and every sign-in would
      # fail with a missing-file error.
      - name: Write shared Google OAuth client
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > web/credentials.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
