<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trakt Calendar Sync</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header><h1>Trakt Calendar Sync</h1></header>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul class="flash">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
