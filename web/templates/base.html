<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trakt Calendar Sync</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // Runs before the stylesheet paints anything, so a stored preference
    // never flashes the other theme first.
    (function () {
      const stored = localStorage.getItem("theme");
      if (stored) document.documentElement.setAttribute("data-theme", stored);
    })();
  </script>
</head>
<body>
  <header>
    <h1>Trakt Calendar Sync</h1>
    <button type="button" id="theme-toggle" aria-label="Toggle dark mode">Toggle dark mode</button>
  </header>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul class="flash">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  <main>{% block content %}{% endblock %}</main>
  <script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const current = document.documentElement.getAttribute("data-theme") || (prefersDark ? "dark" : "light");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });
  </script>
</body>
</html>
