services:
  trakt-calendar-sync-web:
    # Pulls the prebuilt image from GHCR by default (see
    # .github/workflows/docker-publish.yml) - `docker compose up` works
    # without building anything locally. `build:` is still here so
    # `docker compose up --build` (or `docker compose build`) builds from
    # source instead, tagging the result with the same name.
    image: ghcr.io/kylesmart2/trakt-calendar-sync-web:latest
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "6969:6969"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - trakt-calendar-sync-data:/data
    restart: unless-stopped

volumes:
  trakt-calendar-sync-data:
    # The key above is just Compose's internal reference name; this is the
    # name Docker actually creates on the host (visible in `docker volume
    # ls`) - override it with a DATA_VOLUME_NAME env var or .env entry.
    name: ${DATA_VOLUME_NAME:-trakt-calendar-sync-data}
